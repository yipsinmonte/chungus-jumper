<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>chungus jumper · climb the curve</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Major+Mono+Display&family=Playfair+Display:ital,wght@1,600&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff44aa;
    --pink-soft: #ff8fd0;
    --yellow: #fffb00;
    --bg: #0a0410;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: #fff;
    font-family: "Space Grotesk", sans-serif;
    height: 100vh; overflow: hidden;
    user-select: none;
    touch-action: none;
  }
  #game {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
    background:
      radial-gradient(ellipse 60% 40% at 80% 5%, rgba(255,68,170,0.18), transparent 60%),
      radial-gradient(ellipse 50% 35% at 15% 95%, rgba(180,80,255,0.14), transparent 60%),
      var(--bg);
  }
  .grain {
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.013) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
    z-index: 5;
  }

  /* HUD */
  .hud {
    position: fixed; top: 18px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 22px;
    z-index: 10;
    pointer-events: none;
  }
  .hud-block {
    background: rgba(10,4,16,0.5);
    border: 1px solid rgba(255,143,208,0.18);
    padding: 8px 14px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .label {
    font-family: "Major Mono Display", monospace;
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--pink-soft);
    text-transform: lowercase;
    margin-bottom: 2px;
  }
  .mcap-num {
    font-family: "Bebas Neue", sans-serif;
    font-size: 36px;
    line-height: 1;
    letter-spacing: 2px;
    color: var(--yellow);
    text-shadow: 0 0 18px rgba(255,251,0,0.4);
    font-variant-numeric: tabular-nums;
  }
  .height-num {
    font-family: "Bebas Neue", sans-serif;
    font-size: 28px;
    line-height: 1;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  /* Title screen */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse 70% 55% at 50% 50%, rgba(60,8,42,0.85), rgba(8,2,14,0.96));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    text-align: center;
    padding: 32px;
  }
  .screen.hidden { display: none; }
  .eyebrow {
    font-family: "Major Mono Display", monospace;
    font-size: 12px;
    letter-spacing: 14px;
    color: var(--pink-soft);
    text-transform: lowercase;
    margin-bottom: 22px;
  }
  h1 {
    font-family: "Bebas Neue", sans-serif;
    font-size: 18vw;
    max-font-size: 180px;
    line-height: 0.82;
    letter-spacing: 6px;
    background: linear-gradient(180deg, #fff 0%, #ffd0ee 40%, var(--pink) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 36px rgba(255,68,170,0.3);
    filter: drop-shadow(0 0 22px rgba(255,68,170,0.55));
    text-transform: uppercase;
    margin: 0;
  }
  .tag {
    font-family: "Playfair Display", serif;
    font-style: italic;
    font-size: 22px;
    color: #ffd0ee;
    margin: 18px 0 36px;
    letter-spacing: 0.5px;
  }
  .btn {
    font-family: "Bebas Neue", sans-serif;
    font-size: 38px;
    letter-spacing: 6px;
    color: var(--bg);
    background: var(--yellow);
    padding: 18px 44px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 32px rgba(255,251,0,0.5);
    transition: transform 0.15s;
    margin: 6px;
  }
  .btn:hover, .btn:active { transform: scale(1.05); }
  .btn.ghost {
    background: transparent;
    color: var(--pink-soft);
    border: 1px solid var(--pink-soft);
    box-shadow: none;
  }

  .controls {
    margin-top: 24px;
    font-family: "Major Mono Display", monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--pink-soft);
    opacity: 0.7;
  }

  /* Game over */
  .gameover h1 { font-size: 11vw; line-height: 0.9; }
  .final {
    margin: 10px 0 20px;
    font-family: "Bebas Neue", sans-serif;
    font-size: 96px;
    letter-spacing: 4px;
    color: var(--yellow);
    text-shadow: 0 0 24px rgba(255,251,0,0.5);
    line-height: 1;
  }
  .final-label {
    font-family: "Major Mono Display", monospace;
    font-size: 12px;
    letter-spacing: 8px;
    color: var(--pink-soft);
    text-transform: lowercase;
    margin-bottom: 6px;
  }

  /* Mobile touch hint */
  @media (max-width: 700px) {
    h1 { font-size: 20vw; }
    .tag { font-size: 18px; }
    .gameover h1 { font-size: 13vw; }
    .final { font-size: 64px; }
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div class="grain"></div>

<div class="hud">
  <div class="hud-block">
    <div class="label">mcap</div>
    <div class="mcap-num" id="mcap">$0</div>
  </div>
  <div class="hud-block" style="text-align:right;">
    <div class="label">height</div>
    <div class="height-num"><span id="height">0</span>m</div>
  </div>
</div>

<div class="screen" id="title">
  <div class="eyebrow">— jump the curve —</div>
  <h1>Chungus<br>Jumper</h1>
  <div class="tag">climb the bonding curve · eat the buys · dodge the dumps</div>
  <button class="btn" id="play-btn">JUMP IN</button>
  <div class="controls">← → arrows · A D · or tap left / right</div>
</div>

<div class="screen gameover hidden" id="gameover">
  <div class="eyebrow">— chart crashed —</div>
  <h1>FUCK MY<br>CHUNGUS<br>LIFE</h1>
  <div style="margin-top: 24px;">
    <div class="final-label">final mcap reached</div>
    <div class="final" id="final-mcap">$0</div>
    <div class="final-label">ATH height</div>
    <div class="final" id="final-height" style="font-size: 48px; color: #fff; text-shadow: none;">0m</div>
  </div>
  <div style="margin-top: 28px;">
    <button class="btn" id="retry-btn">JUMP AGAIN</button>
    <button class="btn ghost" id="tweet-btn">TWEET MY ATH</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// chungus image
const chungusImg = new Image();
let chungusReady = false;
chungusImg.onload = () => { chungusReady = true; };
chungusImg.onerror = () => { chungusReady = false; };
chungusImg.src = 'chungus.png';
let W, H;
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const VW = () => window.innerWidth;
const VH = () => window.innerHeight;

// ── game state ─────────────────────────────────────────────
const GRAVITY = 0.4;
const JUMP_V = -13;
const JUMP_GOLD = -19;
const MAX_VX = 7;
const ACCEL = 0.6;
const FRICTION = 0.85;

let player, platforms, coins, particles, hazards, sharks, powerups, stars, candles;
let camera, alive, started, highestY, gameTime;
let nextHazardAt, nextSharkAt, nextPowerupAt;
let input = { left: 0, right: 0 };
// juice
let shakeAmount = 0, shakeDecay = 0;
let zoneFlash = 0, zoneFlashText = '';
let lastZone = -1;
let zoneEnterCamera = 0;
// combo
let comboCount = 0, comboExpires = 0, comboMult = 1;
let comboFlash = 0;

function reset() {
  player = { x: VW()/2, y: VH() - 120, vx: 0, vy: -8, w: 64, h: 64,
             shieldUntil: 0, rocketUntil: 0, slowfallUntil: 0 };
  platforms = [];
  coins = [];
  particles = [];
  hazards = [];
  sharks = [];
  powerups = [];
  candles = [];           // background candle layer
  camera = 0;
  alive = true;
  highestY = player.y;
  gameTime = 0;
  nextHazardAt = 600;
  nextSharkAt = 1200;
  nextPowerupAt = 900;
  shakeAmount = 0; shakeDecay = 0;
  comboCount = 0; comboExpires = 0; comboMult = 1; comboFlash = 0;
  zoneFlash = 0; lastZone = -1; zoneEnterCamera = 0;
  lastPathPlatform = null;
  spawnTier(VH(), 'wide');
  for (let i = 1; i < 10; i++) spawnTier(VH() - i * 110);
  // seed stars (parallax far layer)
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * VW(),
      y: Math.random() * VH() * 3 - VH(),
      r: Math.random() * 1.6 + 0.4,
      tw: Math.random() * Math.PI * 2,
    });
  }
  // seed background candles (parallax mid layer, used in zone 1+2)
  for (let i = 0; i < 14; i++) {
    candles.push(spawnBgCandle(Math.random() * VH() * 3 - VH()));
  }
  // seed zone-themed decorations
  decor = [];
  for (let i = 0; i < 12; i++) {
    decor.push(spawnDecorAt(Math.random() * VH() * 3 - VH()));
  }
}

function spawnBgCandle(y) {
  return {
    x: Math.random() * VW(),
    y,
    h: 40 + Math.random() * 120,
    w: 8 + Math.random() * 6,
    bull: Math.random() < 0.6,
    alpha: 0.10 + Math.random() * 0.18,
  };
}

// ── per-zone decorations: roots / pillars / cosmos / crystals ───
let decor = [];
function spawnDecorAt(y) {
  const z = ZONES[currentZone()];
  const prop = { y, kind: z.decor, born: gameTime };
  if (z.decor === 'roots') {
    prop.x = Math.random() * VW();
    prop.length = 200 + Math.random() * 280;
    prop.curve = (Math.random() - 0.5) * 200;
    prop.thickness = 6 + Math.random() * 8;
  } else if (z.decor === 'pillars') {
    prop.x = 30 + Math.random() * (VW() - 110);
    prop.w = 60 + Math.random() * 50;
    prop.h = 220 + Math.random() * 180;
  } else if (z.decor === 'cosmos') {
    prop.x = Math.random() * VW();
    prop.size = 30 + Math.random() * 80;
    prop.kindSub = Math.random() < 0.6 ? 'cabbage' : 'crystal';
    prop.rot = Math.random() * Math.PI * 2;
    prop.spin = (Math.random() - 0.5) * 0.005;
  } else if (z.decor === 'crystals') {
    prop.x = Math.random() * VW();
    prop.size = 40 + Math.random() * 80;
    prop.sides = 6;
    prop.rot = Math.random() * Math.PI * 2;
    prop.spin = (Math.random() - 0.5) * 0.004;
  }
  return prop;
}

// ── theme zones ────────────────────────────────────────────
const ZONES = [
  { upTo: 800,      name: 'GIANT BURROW',         decor: 'roots',
    bg1: '#1c0a02', bg2: '#3a1a05', accent: '#4dffaa' },
  { upTo: 2000,     name: 'CARROT PILLARS',       decor: 'pillars',
    bg1: '#0a0508', bg2: '#1a0816', accent: '#ff8c1a' },
  { upTo: 4000,     name: 'COSMIC CABBAGE PATCH', decor: 'cosmos',
    bg1: '#0a0530', bg2: '#3a0866', accent: '#88ccff' },
  { upTo: Infinity, name: 'GOLDEN STRATOSPHERE',  decor: 'crystals',
    bg1: '#3d1a4a', bg2: '#ffaa44', accent: '#ffd700' },
];

// optional: drop bg-zone-1.png ... bg-zone-4.png in repo root, they'll auto-load
const zoneImgs = ZONES.map((z, i) => {
  const img = new Image();
  img.dataset = { ready: false };
  img.onload = () => { img.ready = true; };
  img.onerror = () => { img.ready = false; };
  img.src = `bg-zone-${i+1}.png`;
  return img;
});
function currentZone() {
  const h = Math.max(0, -highestY) / 10;
  for (let i = 0; i < ZONES.length; i++) if (h < ZONES[i].upTo) return i;
  return ZONES.length - 1;
}
function shake(amt) {
  if (amt > shakeAmount) { shakeAmount = amt; shakeDecay = amt * 0.06; }
}

// ── difficulty zones based on climb height ────────────────
function difficulty() {
  const h = Math.max(0, -highestY);
  // returns: { greenW, springW, movingW, breakawayW, redW } weights summing roughly
  if (h < 2000) {
    return { green: 0.70, spring: 0.10, moving: 0.0,  breakaway: 0.0,  red: 0.20 };
  } else if (h < 5000) {
    return { green: 0.55, spring: 0.10, moving: 0.20, breakaway: 0.0,  red: 0.15 };
  } else if (h < 10000) {
    return { green: 0.40, spring: 0.10, moving: 0.25, breakaway: 0.15, red: 0.10 };
  } else {
    return { green: 0.30, spring: 0.10, moving: 0.30, breakaway: 0.20, red: 0.10 };
  }
}
function pickType(weights) {
  const r = Math.random();
  let acc = 0;
  for (const k of ['green', 'spring', 'moving', 'breakaway', 'red']) {
    acc += weights[k];
    if (r < acc) return k;
  }
  return 'green';
}

// physics-derived reachability
const MAX_RISE = (JUMP_V * JUMP_V) / (2 * GRAVITY);   // ≈211 px
function timeToRise(gap) {
  if (gap >= MAX_RISE) return Infinity;
  return (-JUMP_V - Math.sqrt(JUMP_V*JUMP_V - 2*GRAVITY*gap)) / GRAVITY;
}
function maxHorizontalReach(gap) {
  const t = timeToRise(gap);
  if (!isFinite(t)) return 0;
  return MAX_VX * t * 0.85;   // 85% safety
}

let lastPathPlatform = null;

function makePlatform(x, y, w, type) {
  const p = { x, y, w, h: 14, type, hit: false, used: false };
  if (type === 'moving') {
    p.vx = (Math.random() < 0.5 ? -1 : 1) * (1.4 + Math.random() * 1.6);
    p.minX = Math.max(0, x - 80 - Math.random()*100);
    p.maxX = Math.min(VW() - w, x + 80 + Math.random()*100);
  }
  return p;
}

// path platform type: never red, never breakaway (path is sacred)
function pickPathType() {
  const w = difficulty();
  const denom = w.green + w.spring + w.moving;
  const r = Math.random() * denom;
  if (r < w.green) return 'green';
  if (r < w.green + w.spring) return 'spring';
  return 'moving';
}

function spawnPathPlatform(y, force) {
  const w = force === 'wide' ? VW() * 0.6 : 96;
  const type = force === 'wide' ? 'green' : pickPathType();
  let x;
  if (!lastPathPlatform || force === 'wide') {
    x = force === 'wide' ? (VW() - w)/2 : (VW() - w)/2 + (Math.random()-0.5) * 200;
  } else {
    const gap = lastPathPlatform.y - y;
    const reach = maxHorizontalReach(gap);
    const anchorCx = lastPathPlatform.x + lastPathPlatform.w/2;
    const side = (anchorCx < VW()/2) ? +1 : -1;
    const flip = Math.random() < 0.25 ? -1 : 1;
    const dir  = side * flip;
    const t    = 0.70 + Math.random() * 0.30;
    let cx = anchorCx + dir * reach * t;
    const minCx = w/2 + 6;
    const maxCx = VW() - w/2 - 6;
    cx = Math.max(minCx, Math.min(maxCx, cx));
    x = cx - w/2;
  }
  const p = makePlatform(x, y, w, type);
  p.isPath = true;
  platforms.push(p);
  lastPathPlatform = p;
  if (Math.random() < 0.28) {
    coins.push({ x: x + w/2 - 12, y: y - 38, w: 24, h: 24, collected: false });
  }
  return p;
}

function platformOverlaps(x, y, w) {
  for (const p of platforms) {
    if (Math.abs(p.y - y) > 36) continue;     // not in same vertical band
    if (x + w + 14 < p.x) continue;            // p is to the right
    if (p.x + p.w + 14 < x) continue;          // p is to the left
    return true;
  }
  return false;
}

function spawnFiller(tierY, pathPlatform) {
  const w0 = difficulty();
  const type = pickType(w0);
  const w = type === 'spring' ? 64 : 92;
  const pathCx = pathPlatform.x + pathPlatform.w/2;

  // try a few positions, pick the first non-overlapping one
  for (let attempt = 0; attempt < 6; attempt++) {
    let cx;
    if (Math.random() < 0.8) {
      // opposite half from path
      cx = pathCx < VW()/2
        ? VW()/2 + 30 + Math.random() * (VW()/2 - 60 - w/2)
        : 30 + Math.random() * (VW()/2 - 60 - w/2);
    } else {
      cx = w/2 + 20 + Math.random() * (VW() - w - 40);
    }
    const x = cx - w/2;
    const y = tierY + (Math.random() - 0.5) * 16;     // ±8 jitter only
    if (platformOverlaps(x, y, w)) continue;
    const p = makePlatform(x, y, w, type);
    platforms.push(p);
    if (type === 'spring' || (type === 'green' && Math.random() < 0.18)) {
      coins.push({ x: x + w/2 - 12, y: y - 36, w: 24, h: 24, collected: false });
    }
    return;
  }
  // failed all attempts → don't spawn (keeps tier clean)
}

function spawnTier(y, force) {
  const path = spawnPathPlatform(y, force);
  if (force === 'wide') return;
  // at most 1 filler per tier — keeps things readable
  if (Math.random() < 0.55) spawnFiller(y, path);
}

function spawnFallingChungus() {
  const size = 70 + Math.random() * 30;
  const x = Math.random() * (VW() - size);
  const y = camera - size - 30;
  const vy = 2.0 + Math.random() * 2.5;
  const vx = (Math.random() - 0.5) * 1.5;
  hazards.push({ x, y, vx, vy, w: size, h: size, born: gameTime });
}

// Jeet shark — slides across screen at random height, telegraph then attack
function spawnJeetShark() {
  const fromLeft = Math.random() < 0.5;
  const size = 90;
  const y = camera + 80 + Math.random() * (VH() - 200);
  const vx = (fromLeft ? 1 : -1) * (5 + Math.random() * 3);
  sharks.push({
    x: fromLeft ? -size - 20 : VW() + 20,
    y, vx, w: size, h: size * 0.6,
    telegraph: 60,    // 60 frames warning before they actually start moving
    born: gameTime,
  });
}

// Power-up: rocket (carrot), shield (diamond), slowfall (bonk hat), pumpcandle
function spawnPowerup(y) {
  const types = ['rocket', 'shield', 'slowfall', 'pumpcandle'];
  const type = types[Math.floor(Math.random() * types.length)];
  const x = 30 + Math.random() * (VW() - 80);
  powerups.push({ x, y: y - 40, w: 38, h: 38, type, collected: false, born: gameTime });
}

function emit(x, y, color, n=10) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*4,
      vy: (Math.random()-0.5)*4 - 2,
      life: 30 + Math.random()*20,
      color,
    });
  }
}

// ── input ──────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = 1;
  if (e.key === 'ArrowRight'|| e.key === 'd' || e.key === 'D') input.right = 1;
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = 0;
  if (e.key === 'ArrowRight'|| e.key === 'd' || e.key === 'D') input.right = 0;
});

// touch: left/right halves
let touchActive = false;
function tStart(e) {
  if (!started || !alive) return;
  for (const t of e.touches) {
    if (t.clientX < VW()/2) input.left = 1;
    else input.right = 1;
  }
  touchActive = true;
  e.preventDefault();
}
function tEnd(e) {
  input.left = 0; input.right = 0;
  for (const t of e.touches) {
    if (t.clientX < VW()/2) input.left = 1;
    else input.right = 1;
  }
}
canvas.addEventListener('touchstart', tStart, { passive: false });
canvas.addEventListener('touchend', tEnd, { passive: false });
canvas.addEventListener('touchcancel', tEnd, { passive: false });
canvas.addEventListener('touchmove', tStart, { passive: false });

// ── game loop ──────────────────────────────────────────────
function update() {
  if (!started || !alive) return;
  gameTime++;

  // input → vx
  if (input.left)  player.vx -= ACCEL;
  if (input.right) player.vx += ACCEL;
  if (!input.left && !input.right) player.vx *= FRICTION;
  player.vx = Math.max(-MAX_VX, Math.min(MAX_VX, player.vx));

  // physics with power-up modifiers
  const inRocket = gameTime < player.rocketUntil;
  const inSlowfall = gameTime < player.slowfallUntil;
  if (inRocket) {
    player.vy = -16;          // sustained upward thrust
    emit(player.x + player.w/2, player.y + player.h, '#fffb00', 1);
  } else {
    player.vy += inSlowfall ? GRAVITY * 0.45 : GRAVITY;
  }
  player.x += player.vx;
  player.y += player.vy;

  // wrap horizontally
  if (player.x < -player.w) player.x = VW();
  if (player.x > VW())      player.x = -player.w;

  // move moving platforms
  for (const p of platforms) {
    if (p.type === 'moving') {
      p.x += p.vx;
      if (p.x <= p.minX || p.x + p.w >= p.maxX) p.vx *= -1;
      p.x = Math.max(p.minX, Math.min(p.maxX - p.w, p.x));
    }
  }

  // breakaway fade-out & cleanup
  for (const p of platforms) {
    if (p.type === 'breakaway' && p.used) p.alpha = (p.alpha ?? 1) - 0.06;
  }
  platforms = platforms.filter(p => !(p.type === 'breakaway' && (p.alpha ?? 1) <= 0));

  // platform collisions (only when falling)
  if (player.vy > 0) {
    for (const p of platforms) {
      if (p.type === 'breakaway' && p.used) continue;
      const px = player.x + player.w/2;
      const pyBottom = player.y + player.h;
      if (px > p.x && px < p.x + p.w
          && pyBottom > p.y && pyBottom < p.y + p.h + 8
          && player.y < p.y) {
        if (p.type === 'red') {
          alive = false;
          emit(player.x + player.w/2, player.y + player.h/2, '#ff2266', 30);
          gameOver(); return;
        }
        if (p.type === 'spring') {
          player.vy = JUMP_GOLD;
          emit(p.x + p.w/2, p.y, '#fffb00', 16);
        } else if (p.type === 'breakaway') {
          player.vy = JUMP_V;
          p.used = true;
          p.alpha = 1;
          emit(p.x + p.w/2, p.y, '#cc88ff', 14);
        } else {
          player.vy = JUMP_V;
          if (!p.hit) { p.hit = true; emit(p.x + p.w/2, p.y, '#88ff44', 8); }
        }
      }
    }
  }

  // ── falling chungus hazards ────────────────────────────────
  // spawn rate scales with height
  const climbed = Math.max(0, -highestY);
  if (gameTime >= nextHazardAt) {
    spawnFallingChungus();
    const baseInterval = climbed < 1500 ? 480 : climbed < 4000 ? 320 : climbed < 8000 ? 200 : 120;
    nextHazardAt = gameTime + baseInterval + Math.random() * 240;
  }
  // update hazards
  for (const h of hazards) {
    h.y += h.vy;
    h.x += h.vx;
    h.vy += 0.05; // slight accel
  }
  // collide hazards with player (shield blocks)
  const shielded = gameTime < player.shieldUntil;
  for (const h of hazards) {
    if (player.x + player.w > h.x + h.w*0.15
        && player.x < h.x + h.w*0.85
        && player.y + player.h > h.y + h.h*0.15
        && player.y < h.y + h.h*0.85) {
      if (shielded) {
        // bounce off, kill the hazard
        player.vy = JUMP_V;
        h.dead = true;
        emit(h.x + h.w/2, h.y + h.h/2, '#fffb00', 20);
        shake(8);
      } else {
        alive = false;
        emit(player.x + player.w/2, player.y + player.h/2, '#ff2266', 40);
        shake(20);
        gameOver(); return;
      }
    }
  }
  hazards = hazards.filter(h => !h.dead && h.y < camera + VH() + 200);

  // ── jeet sharks ───────────────────────────────────────────
  if (gameTime >= nextSharkAt && climbed > 1500) {
    spawnJeetShark();
    nextSharkAt = gameTime + (climbed < 5000 ? 1200 : climbed < 10000 ? 700 : 450) + Math.random() * 600;
  }
  for (const s of sharks) {
    if (s.telegraph > 0) { s.telegraph--; continue; }
    s.x += s.vx;
    if (player.x + player.w > s.x + 10 && player.x < s.x + s.w - 10
        && player.y + player.h > s.y + 6 && player.y < s.y + s.h - 6) {
      if (shielded) {
        player.vy = JUMP_V;
        s.dead = true;
        emit(s.x + s.w/2, s.y + s.h/2, '#fffb00', 20);
        shake(8);
      } else {
        alive = false;
        emit(player.x + player.w/2, player.y + player.h/2, '#44ddff', 40);
        shake(20);
        gameOver(); return;
      }
    }
  }
  sharks = sharks.filter(s => !s.dead && s.x > -200 && s.x < VW() + 200);

  // ── powerup spawn ─────────────────────────────────────────
  if (gameTime >= nextPowerupAt) {
    spawnPowerup(camera - 40 - Math.random() * 200);
    nextPowerupAt = gameTime + 600 + Math.random() * 600;     // every 10-20 sec
  }

  // ── zone detection + flash ────────────────────────────────
  const zoneIdx = currentZone();
  if (zoneIdx !== lastZone) {
    if (lastZone >= 0) { zoneFlash = 90; zoneFlashText = '⚡ ' + ZONES[zoneIdx].name; shake(12); }
    lastZone = zoneIdx;
    zoneEnterCamera = camera;        // reset parallax origin so new bg starts un-flipped
  }
  if (zoneFlash > 0) zoneFlash--;

  // ── shake decay ───────────────────────────────────────────
  if (shakeAmount > 0) {
    shakeAmount = Math.max(0, shakeAmount - shakeDecay);
  }

  // ── parallax stars + bg candles ────────────────────────────
  for (const star of stars) {
    star.tw += 0.05;
    // recycle when off-screen
    if (star.y > camera + VH() + 50) star.y = camera - VH() - Math.random() * 200;
  }
  for (const c of candles) {
    if (c.y > camera + VH() + 100) {
      Object.assign(c, spawnBgCandle(camera - VH() - Math.random() * 100));
    }
  }
  for (const d of decor) {
    if (d.spin) d.rot += d.spin;
    if (d.y > camera + VH() + 200) {
      Object.assign(d, spawnDecorAt(camera - VH() - Math.random() * 100));
    }
  }

  // coins → combo system
  for (const c of coins) {
    if (c.collected) continue;
    if (player.x + player.w > c.x && player.x < c.x + c.w
        && player.y + player.h > c.y && player.y < c.y + c.h) {
      c.collected = true;
      emit(c.x + c.w/2, c.y + c.h/2, '#fffb00', 12);
      // combo logic
      if (gameTime < comboExpires) comboCount++;
      else comboCount = 1;
      comboExpires = gameTime + 120;     // 2s window
      comboMult = Math.min(5, 1 + Math.floor(comboCount / 3));
      comboFlash = 30;
    }
  }
  if (gameTime > comboExpires) { comboCount = 0; comboMult = 1; }
  if (comboFlash > 0) comboFlash--;

  // powerups
  for (const pu of powerups) {
    if (pu.collected) continue;
    if (player.x + player.w > pu.x && player.x < pu.x + pu.w
        && player.y + player.h > pu.y && player.y < pu.y + pu.h) {
      pu.collected = true;
      emit(pu.x + pu.w/2, pu.y + pu.h/2, '#fffb00', 24);
      shake(8);
      if (pu.type === 'rocket')      player.rocketUntil = gameTime + 240;
      if (pu.type === 'shield')      player.shieldUntil = gameTime + 360;
      if (pu.type === 'slowfall')    player.slowfallUntil = gameTime + 360;
      if (pu.type === 'pumpcandle')  player.vy = JUMP_GOLD * 1.6;
    }
  }
  powerups = powerups.filter(p => !p.collected && p.y < camera + VH() + 200);

  // camera scroll: keep player above 1/3
  const targetCam = player.y - VH() / 3;
  if (targetCam < camera) camera = targetCam;
  highestY = Math.min(highestY, player.y);

  // spawn new platforms above
  // spawn next tier above the highest path platform we've placed
  while (lastPathPlatform.y > camera - 200) {
    // wider gap = more air time = bigger zigzag horizontally
    const gap = 100 + Math.random() * 90;   // 100-190px
    spawnTier(lastPathPlatform.y - gap);
  }
  // cull off-screen
  platforms = platforms.filter(p => p.y < camera + VH() + 200);
  coins = coins.filter(c => !c.collected && c.y < camera + VH() + 200);

  // particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // game over if fallen
  if (player.y > camera + VH() + 100) { alive = false; gameOver(); return; }

  // update HUD
  const heightM = Math.max(0, Math.floor(-highestY / 10));
  // mcap = base height × $1000, with combo multiplier on collected coins (count)
  const collected = coins.filter(c => c.collected).length;
  const mcap = heightM * 1000 + collected * 1000 * (comboMult);
  document.getElementById('mcap').textContent = '$' + mcap.toLocaleString();
  document.getElementById('height').textContent = heightM.toLocaleString();
}

// ── draw ───────────────────────────────────────────────────
function rounded(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawDecor() {
  for (const d of decor) {
    const dy = d.y - camera * 0.5;
    if (dy < -400 || dy > VH() + 200) continue;
    if (d.kind === 'roots') {
      // glowing carrot-tree root tendril descending
      ctx.save();
      ctx.shadowColor = '#4dffaa';
      ctx.shadowBlur = 18;
      ctx.strokeStyle = 'rgba(77, 255, 170, 0.32)';
      ctx.lineWidth = d.thickness;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(d.x, dy);
      ctx.bezierCurveTo(
        d.x + d.curve * 0.5, dy + d.length * 0.4,
        d.x - d.curve * 0.5, dy + d.length * 0.7,
        d.x + d.curve, dy + d.length
      );
      ctx.stroke();
      // bioluminescent fungi nodes
      ctx.fillStyle = 'rgba(140, 255, 200, 0.55)';
      for (let s = 0.2; s < 1; s += 0.25) {
        const fx = d.x + d.curve * s + Math.sin(s * Math.PI) * 12;
        const fy = dy + d.length * s;
        ctx.beginPath();
        ctx.arc(fx, fy, 4 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    } else if (d.kind === 'pillars') {
      // giant carved orange carrot pillar
      ctx.save();
      const grad = ctx.createLinearGradient(d.x, dy, d.x + d.w, dy);
      grad.addColorStop(0, 'rgba(255, 100, 20, 0.18)');
      grad.addColorStop(0.5, 'rgba(255, 140, 26, 0.55)');
      grad.addColorStop(1, 'rgba(255, 100, 20, 0.18)');
      ctx.fillStyle = grad;
      ctx.shadowColor = '#ff8c1a';
      ctx.shadowBlur = 20;
      // pillar body (slightly tapered like a carrot)
      ctx.beginPath();
      ctx.moveTo(d.x + d.w * 0.1, dy);
      ctx.lineTo(d.x + d.w * 0.9, dy);
      ctx.lineTo(d.x + d.w, dy + d.h);
      ctx.lineTo(d.x, dy + d.h);
      ctx.closePath();
      ctx.fill();
      // golden leafy top
      ctx.fillStyle = 'rgba(255, 215, 0, 0.55)';
      ctx.beginPath();
      ctx.moveTo(d.x, dy);
      ctx.lineTo(d.x + d.w * 0.3, dy - 22);
      ctx.lineTo(d.x + d.w * 0.5, dy - 8);
      ctx.lineTo(d.x + d.w * 0.7, dy - 26);
      ctx.lineTo(d.x + d.w, dy);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else if (d.kind === 'cosmos') {
      // floating frozen cabbage / crystalline carrot
      ctx.save();
      ctx.translate(d.x, dy);
      ctx.rotate(d.rot);
      ctx.shadowColor = '#88ccff';
      ctx.shadowBlur = 22;
      if (d.kindSub === 'cabbage') {
        // concentric icy circles
        ctx.fillStyle = 'rgba(120, 180, 255, 0.35)';
        for (let r = d.size; r > 6; r -= 8) {
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = 'rgba(180, 220, 255, 0.5)';
        ctx.lineWidth = 1.5;
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * d.size, Math.sin(a) * d.size);
          ctx.stroke();
        }
      } else {
        // crystalline carrot diamond
        ctx.fillStyle = 'rgba(255, 160, 90, 0.3)';
        ctx.strokeStyle = 'rgba(255, 200, 140, 0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -d.size);
        ctx.lineTo(d.size * 0.5, 0);
        ctx.lineTo(0, d.size);
        ctx.lineTo(-d.size * 0.5, 0);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }
      ctx.restore();
    } else if (d.kind === 'crystals') {
      // suspended golden geometric crystal
      ctx.save();
      ctx.translate(d.x, dy);
      ctx.rotate(d.rot);
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 24;
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, d.size);
      grad.addColorStop(0, 'rgba(255, 230, 120, 0.7)');
      grad.addColorStop(1, 'rgba(255, 170, 50, 0.15)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      for (let i = 0; i < d.sides; i++) {
        const a = (i / d.sides) * Math.PI * 2;
        const r = d.size * (i % 2 === 0 ? 1 : 0.7);
        const x = Math.cos(a) * r, y = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 245, 180, 0.55)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }
  }
}

function draw() {
  // screen-shake offset
  const sx = (Math.random() - 0.5) * shakeAmount;
  const sy = (Math.random() - 0.5) * shakeAmount;
  ctx.save();
  ctx.translate(sx, sy);

  ctx.clearRect(-50, -50, VW()+100, VH()+100);

  // ── theme zone background ──
  const zone = ZONES[currentZone()];
  const grad = ctx.createLinearGradient(0, 0, 0, VH());
  grad.addColorStop(0, zone.bg1);
  grad.addColorStop(1, zone.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(-50, -50, VW()+100, VH()+100);

  // accent radial glows
  const rg = ctx.createRadialGradient(VW()*0.85, VH()*0.1, 50, VW()*0.85, VH()*0.1, VW()*0.6);
  rg.addColorStop(0, zone.accent + '33');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, VW(), VH());

  // ── parallax layer 1: distant stars (slowest) ──
  for (const star of stars) {
    const y = star.y - camera * 0.2;     // 0.2× scroll = far layer
    if (y < -10 || y > VH() + 10) continue;
    const tw = 0.5 + 0.5 * Math.sin(star.tw);
    ctx.fillStyle = `rgba(255, 255, 255, ${tw * 0.6})`;
    ctx.beginPath();
    ctx.arc(star.x, y, star.r, 0, Math.PI*2);
    ctx.fill();
  }

  // ── parallax layer 2: zone-themed art (mid) ──
  const zIdx = currentZone();
  const zImg = zoneImgs[zIdx];

  if (zImg && zImg.ready && zImg.naturalWidth > 0) {
    // cover-fit: fill viewport width, scale height by aspect
    const imgAspect = zImg.naturalHeight / zImg.naturalWidth;
    const drawW = VW();
    const drawH = drawW * imgAspect;
    // parallax: slow scroll so seams are less frequent
    const PAR = 0.25;
    // cycle = 2 × drawH (mirror tiling cycle)
    const cycle = drawH * 2;
    // offset is RELATIVE to when we entered this zone — first tile at y=0 is un-flipped
    const cameraDelta = camera - zoneEnterCamera;
    const off = ((cameraDelta * PAR) % cycle + cycle) % cycle;
    let y = -off;
    let tileIdx = 0;
    ctx.globalAlpha = 0.92;
    while (y < VH() + 50) {
      const flipped = tileIdx % 2 === 1;
      if (flipped) {
        ctx.save();
        ctx.translate(0, y + drawH);
        ctx.scale(1, -1);
        ctx.drawImage(zImg, 0, 0, drawW, drawH);
        ctx.restore();
      } else {
        ctx.drawImage(zImg, 0, y, drawW, drawH);
      }
      y += drawH;
      tileIdx++;
    }
    ctx.globalAlpha = 1;
    // dim slightly so platforms still pop
    ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
    ctx.fillRect(0, 0, VW(), VH());
  } else {
    // fallback: procedural decorations
    drawDecor();
    // bg candles only in early zones
    if (zIdx < 2) {
      for (const c of candles) {
        const y = c.y - camera * 0.5;
        if (y < -200 || y > VH() + 100) continue;
        ctx.globalAlpha = c.alpha * (1 - zIdx * 0.4);
        ctx.fillStyle = c.bull ? '#44ff88' : '#ff2266';
        ctx.fillRect(c.x, y, c.w, c.h);
        ctx.fillRect(c.x + c.w/2 - 1, y - 10, 2, c.h + 20);
        ctx.globalAlpha = 1;
      }
    }
  }

  // (chart grid removed — bg images carry the visual depth now)

  // platforms (as candles)
  for (const p of platforms) {
    const sy = p.y - camera;
    if (sy > VH() + 30 || sy < -30) continue;
    let body, glow;
    if (p.type === 'red')        { body = '#ff2266'; glow = 'rgba(255,34,102,0.6)'; }
    else if (p.type === 'spring'){ body = '#fffb00'; glow = 'rgba(255,251,0,0.75)'; }
    else if (p.type === 'moving'){ body = '#44ddff'; glow = 'rgba(68,221,255,0.6)'; }
    else if (p.type === 'breakaway'){ body = '#cc88ff'; glow = 'rgba(204,136,255,0.5)'; }
    else                         { body = '#44ff88'; glow = 'rgba(68,255,136,0.5)'; }

    const alpha = p.alpha ?? 1;
    ctx.globalAlpha = alpha;

    // wick
    ctx.strokeStyle = body;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x + p.w/2, sy - 10);
    ctx.lineTo(p.x + p.w/2, sy + p.h + 10);
    ctx.stroke();

    // glow body
    ctx.shadowColor = glow;
    ctx.shadowBlur = 14;
    ctx.fillStyle = body;
    rounded(p.x, sy, p.w, p.h, 3);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (p.type === 'spring') {
      ctx.fillStyle = '#222';
      ctx.font = '700 14px "Major Mono Display", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', p.x + p.w/2, sy + p.h/2 + 1);
    } else if (p.type === 'moving') {
      // little arrows showing motion
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '10px "Major Mono Display", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.vx > 0 ? '→' : '←', p.x + p.w/2, sy + 11);
    } else if (p.type === 'breakaway') {
      // dashed look
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      for (let dx = 6; dx < p.w - 6; dx += 12) ctx.fillRect(p.x + dx, sy + 4, 6, 6);
    }
    ctx.globalAlpha = 1;
  }

  // ── hazards (falling fat chunguses) ───────────────────────
  for (const h of hazards) {
    const sy = h.y - camera;
    if (sy > VH() + 50 || sy < -h.h - 50) continue;
    ctx.save();
    ctx.shadowColor = 'rgba(255,143,208,0.55)';
    ctx.shadowBlur = 28;
    ctx.translate(h.x + h.w/2, sy + h.h/2);
    // wobble rotation while falling
    const rot = Math.sin((gameTime + h.born * 0.1) * 0.08) * 0.18;
    ctx.rotate(rot);
    // FAT chungus — wider + slightly squashed vertically
    ctx.scale(1.45, 0.88);
    if (chungusReady) {
      ctx.drawImage(chungusImg, -h.w/2, -h.h/2, h.w, h.h);
    } else {
      ctx.font = `${h.h * 0.95}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐰', 0, 4);
    }
    ctx.restore();
  }

  // coins
  for (const c of coins) {
    if (c.collected) continue;
    const sy = c.y - camera;
    if (sy > VH() + 30 || sy < -30) continue;
    ctx.shadowColor = 'rgba(255,251,0,0.7)';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#fffb00';
    ctx.beginPath();
    ctx.arc(c.x + c.w/2, sy + c.h/2, c.w/2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0a0410';
    ctx.font = '700 14px "Major Mono Display", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', c.x + c.w/2, sy + c.h/2 + 1);
  }

  // particles
  for (const pp of particles) {
    const sy = pp.y - camera;
    ctx.fillStyle = pp.color;
    ctx.globalAlpha = Math.max(0, pp.life / 50);
    ctx.fillRect(pp.x, sy, 3, 3);
  }
  ctx.globalAlpha = 1;

  // ── jeet sharks ────────────────────────────────────────────
  for (const s of sharks) {
    const sy = s.y - camera;
    if (sy > VH() + 50 || sy < -100) continue;
    if (s.telegraph > 0) {
      // warning indicator
      ctx.fillStyle = `rgba(68, 221, 255, ${0.3 + Math.sin(gameTime * 0.3) * 0.3})`;
      const fromLeft = s.vx > 0;
      ctx.fillRect(fromLeft ? 0 : VW() - 6, sy - 4, 6, s.h + 8);
      ctx.fillStyle = '#44ddff';
      ctx.font = '700 14px "Major Mono Display", monospace';
      ctx.textAlign = fromLeft ? 'left' : 'right';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#44ddff'; ctx.shadowBlur = 12;
      ctx.fillText(`🦈 jeet incoming`, fromLeft ? 14 : VW() - 14, sy + s.h/2);
      ctx.shadowBlur = 0;
    } else {
      // shark body
      ctx.save();
      ctx.translate(s.x + s.w/2, sy + s.h/2);
      if (s.vx < 0) ctx.scale(-1, 1);
      ctx.shadowColor = 'rgba(68, 221, 255, 0.7)';
      ctx.shadowBlur = 24;
      ctx.fillStyle = '#44ddff';
      ctx.beginPath();
      // shark shape
      ctx.moveTo(-s.w/2, 0);
      ctx.quadraticCurveTo(-s.w/4, -s.h/2, s.w/3, -s.h/2.5);
      ctx.lineTo(s.w/2, 0);
      ctx.lineTo(s.w/3, s.h/2.5);
      ctx.quadraticCurveTo(-s.w/4, s.h/2, -s.w/2, 0);
      ctx.closePath();
      ctx.fill();
      // tail
      ctx.beginPath();
      ctx.moveTo(-s.w/2, -8);
      ctx.lineTo(-s.w/2 - 18, -12);
      ctx.lineTo(-s.w/2 - 12, 0);
      ctx.lineTo(-s.w/2 - 18, 12);
      ctx.lineTo(-s.w/2, 8);
      ctx.fill();
      // eye
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(s.w/4, -s.h/6, 3, 0, Math.PI*2); ctx.fill();
      // teeth — JEET text
      ctx.fillStyle = '#fff';
      ctx.font = '700 11px "Major Mono Display", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('JEET', 0, s.h/4);
      ctx.restore();
    }
  }

  // ── powerups ───────────────────────────────────────────────
  for (const pu of powerups) {
    if (pu.collected) continue;
    const py = pu.y - camera;
    if (py > VH() + 30 || py < -40) continue;
    const bob = Math.sin((gameTime + pu.born) * 0.08) * 4;
    let icon = '?', color = '#fffb00';
    if (pu.type === 'rocket')      { icon = '🥕'; color = '#ff8844'; }
    if (pu.type === 'shield')      { icon = '💎'; color = '#44ddff'; }
    if (pu.type === 'slowfall')    { icon = '🪂'; color = '#88ff44'; }
    if (pu.type === 'pumpcandle')  { icon = '🚀'; color = '#fffb00'; }

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 24;
    ctx.fillStyle = color + '33';
    ctx.beginPath();
    ctx.arc(pu.x + pu.w/2, py + pu.h/2 + bob, pu.w/2 + 2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = `${pu.h * 0.85}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(icon, pu.x + pu.w/2, py + pu.h/2 + bob + 2);
    ctx.restore();
  }

  // ── chungus ────────────────────────────────────────────────
  if (alive) {
    const psy = player.y - camera;
    const cx = player.x + player.w/2;
    const cy = psy + player.h/2;
    const inRocket = gameTime < player.rocketUntil;
    const inSlowfall = gameTime < player.slowfallUntil;
    const inShield = gameTime < player.shieldUntil;
    const squash = player.vy < 0 ? 0.92 : 1.06;
    const stretchX = player.vy < 0 ? 1 : 1.04;

    // rocket flame
    if (inRocket) {
      ctx.fillStyle = `rgba(255, 140, 60, ${0.6 + Math.random() * 0.3})`;
      ctx.beginPath();
      ctx.moveTo(cx - 14, psy + player.h - 4);
      ctx.lineTo(cx + 14, psy + player.h - 4);
      ctx.lineTo(cx, psy + player.h + 26 + Math.random() * 14);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = `rgba(255, 251, 0, ${0.7 + Math.random() * 0.3})`;
      ctx.beginPath();
      ctx.moveTo(cx - 8, psy + player.h - 2);
      ctx.lineTo(cx + 8, psy + player.h - 2);
      ctx.lineTo(cx, psy + player.h + 16 + Math.random() * 8);
      ctx.closePath(); ctx.fill();
    }

    // slowfall parachute
    if (inSlowfall && player.vy > 0) {
      ctx.fillStyle = 'rgba(136, 255, 68, 0.8)';
      ctx.beginPath();
      ctx.arc(cx, psy - 16, player.w * 0.7, Math.PI, 0);
      ctx.fill();
      ctx.strokeStyle = '#88ff44';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - player.w * 0.7, psy - 16);
      ctx.lineTo(cx, psy);
      ctx.moveTo(cx + player.w * 0.7, psy - 16);
      ctx.lineTo(cx, psy);
      ctx.stroke();
    }

    ctx.save();
    ctx.shadowColor = 'rgba(255,68,170,0.55)';
    ctx.shadowBlur = 28;
    ctx.translate(cx, cy);
    ctx.scale(stretchX, squash);
    if (player.vx > 0.5) ctx.scale(-1, 1);
    if (chungusReady) {
      const drawW = player.w * 1.35;
      const drawH = player.h * 1.35;
      ctx.drawImage(chungusImg, -drawW/2, -drawH/2, drawW, drawH);
    } else {
      ctx.font = `${player.h}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐰', 0, 4);
    }
    ctx.restore();

    // shield bubble
    if (inShield) {
      const pulse = 0.7 + 0.3 * Math.sin(gameTime * 0.3);
      ctx.strokeStyle = `rgba(68, 221, 255, ${pulse})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = '#44ddff'; ctx.shadowBlur = 24;
      ctx.beginPath();
      ctx.arc(cx, cy, player.w * 0.85, 0, Math.PI*2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  ctx.restore();   // close shake transform

  // ── overlays (no shake) ────────────────────────────────────
  // combo
  if (comboCount >= 3 && alive) {
    const a = Math.max(0, Math.min(1, comboFlash / 30 + 0.6));
    ctx.fillStyle = `rgba(255, 251, 0, ${a})`;
    ctx.font = `700 ${48 + comboMult * 4}px "Bebas Neue", sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#fffb00'; ctx.shadowBlur = 22;
    ctx.fillText(`x${comboMult} · ${comboCount} COMBO`, VW()/2, 100);
    ctx.shadowBlur = 0;
  }

  // zone flash banner
  if (zoneFlash > 0 && alive) {
    const a = zoneFlash > 60 ? (90 - zoneFlash) / 30 : zoneFlash / 60;
    ctx.fillStyle = `rgba(255, 251, 0, ${a})`;
    ctx.font = `700 ${VW() < 600 ? 56 : 96}px "Bebas Neue", sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = ZONES[currentZone()].accent; ctx.shadowBlur = 32;
    ctx.fillText(zoneFlashText, VW()/2, VH()/2);
    ctx.shadowBlur = 0;
  }
}

let raf;
function loop() {
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

// ── screen control ─────────────────────────────────────────
const titleEl = document.getElementById('title');
const goEl = document.getElementById('gameover');

function start() {
  reset();
  started = true;
  alive = true;
  titleEl.classList.add('hidden');
  goEl.classList.add('hidden');
}

function gameOver() {
  const heightM = Math.max(0, Math.floor(-highestY / 10));
  const mcap = heightM * 1000;
  document.getElementById('final-mcap').textContent = '$' + mcap.toLocaleString();
  document.getElementById('final-height').textContent = heightM.toLocaleString() + 'm';
  goEl.classList.remove('hidden');
}

function tweetIt() {
  const heightM = Math.max(0, Math.floor(-highestY / 10));
  const mcap = heightM * 1000;
  const text = `FUCK MY CHUNGUS LIFE\n\ni climbed $CHUNGUS to $${mcap.toLocaleString()} mcap (${heightM}m) before the chart crashed 🐰\n\nbeat me at chungus.cool`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

document.getElementById('play-btn').addEventListener('click', start);
document.getElementById('retry-btn').addEventListener('click', start);
document.getElementById('tweet-btn').addEventListener('click', tweetIt);

// boot
reset();
loop();
</script>
</body>
